name: Build and Prerelease

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - "documents/**"
      - "**/*.md"

  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - "documents/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  BUILD_TYPE: Release

jobs:
  get-info:
    runs-on: ubuntu-24.04
    outputs:
      date: ${{ steps.vars.outputs.date }}
      shorthash: ${{ steps.vars.outputs.shorthash }}
      fullhash: ${{ steps.vars.outputs.fullhash }}
    steps:
    - uses: actions/checkout@v6
    - name: Get date and git hash
      id: vars
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        echo "shorthash=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "fullhash=$(git rev-parse HEAD)" >> $GITHUB_ENV
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "shorthash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "fullhash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  clang-format:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main'
        sudo apt update
        sudo apt install clang-format-19
    - name: Build
      env:
        COMMIT_RANGE: ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
      run: ./.ci/clang-format.sh

  build-windows:
    runs-on: windows-2022
    needs: get-info
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup VS Environment
      uses: rainmakerv3/msvc-dev-cmd@v1.13.0
      with:
        arch: amd64
        vsversion: 2022

    - name: Print CPU Info
      run: bash -c "cat /proc/cpuinfo"

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DFORCE_UAC=ON -DCMAKE_PREFIX_PATH=${{ github.workspace }}/qtstatic -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -G Ninja -DUSE_WEBENGINE=OFF
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
    - name: Deploy and Package
      run: |
        mkdir upload
        move build/BB_Launcher.exe upload
        Compress-Archive -Path upload/* -DestinationPath BB_Launcher-win64-qt-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}.zip
    - name: Upload Windows Qt artifact
      uses: actions/upload-artifact@v6
      with:
        name: BB_Launcher-win64-qt-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}
        path: upload/

  build-windows-noUAC:
    runs-on: windows-2022
    needs: get-info
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup VS Environment
      uses: rainmakerv3/msvc-dev-cmd@v1.13.0
      with:
        arch: amd64
        vsversion: 2022

    - name: Print CPU Info
      run: bash -c "cat /proc/cpuinfo"

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DFORCE_UAC=OFF -DCMAKE_PREFIX_PATH=${{ github.workspace }}/qtstatic -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -G Ninja -DUSE_WEBENGINE=OFF
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
    - name: Deploy and Package
      run: |
        mkdir upload
        move build/BB_Launcher.exe upload
        Compress-Archive -Path upload/* -DestinationPath BB_Launcher-win64-qt-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}.zip
    - name: Upload Windows Qt artifact
      uses: actions/upload-artifact@v6
      with:
        name: BB_Launcher-win64-qt-noUAC-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}
        path: upload/

  build-macos:
    runs-on: macos-15
    needs: get-info
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup latest Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.10.0
        host: mac
        target: desktop
        arch: clang_64
        archives: qtbase qttools qtdeclarative
        modules: qtmultimedia qtimageformats qtwebview qtwebsockets

    - name: Print CPU Info
      run: sysctl hw machdep.cpu

    - name: Configure CMake
      run: cmake --fresh -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_OSX_ARCHITECTURES=x86_64 -DUSE_WEBENGINE=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Package and Upload macOS Qt artifact
      run: |
        mkdir upload
        mv ${{github.workspace}}/build/BB_Launcher.app upload
        macdeployqt upload/BB_Launcher.app -qmldir=${{github.workspace}}/dist
        tar cf BB_Launcher-macos-qt.tar.gz -C upload .
    - uses: actions/upload-artifact@v6
      with:
        name: BB_Launcher-macos-qt-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}
        path: BB_Launcher-macos-qt.tar.gz


  build-linux:
    runs-on: ubuntu-24.04
    needs: get-info
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Add LLVM repository
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'

    - name: Install dependencies
      run: sudo apt-get update && sudo apt install -y libx11-dev libxext-dev libwayland-dev libdecor-0-dev libxkbcommon-dev libglfw3-dev libgles2-mesa-dev libfuse2 mold build-essential libasound2-dev libpulse-dev libopenal-dev libudev-dev

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.10.0
        arch: linux_gcc_64
        modules: "qtmultimedia qtimageformats qtwebview qtwebsockets"
        tools: 'tools_generic tools_opensslv3_src'
        setup-python: false
        cache: true

    - name: Print CPU Info
      run: cat /proc/cpuinfo

    - name: Configure CMake
      run: cmake --fresh -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=mold" -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=mold" -DUSE_WEBENGINE=OFF

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Build AppImage
      run: |
        export Qt6_DIR="/usr/lib/qt6"
        export PATH="$Qt6_DIR/bin:$PATH"
        export LINUXDEPLOY_EXCLUDED_LIBRARIES="libqtiff.so"
        export EXTRA_QT_PLUGINS="waylandcompositor"
        export EXTRA_PLATFORM_PLUGINS="libqwayland.so"
        wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-checkrt/releases/download/continuous/linuxdeploy-plugin-checkrt-x86_64.sh"
        chmod a+x linuxdeploy-x86_64.AppImage
        chmod a+x linuxdeploy-plugin-qt-x86_64.AppImage
        chmod a+x linuxdeploy-plugin-checkrt-x86_64.sh
        ./linuxdeploy-x86_64.AppImage --appdir AppDir
        bash ./linuxdeploy-plugin-checkrt-x86_64.sh --appdir AppDir
        ./linuxdeploy-x86_64.AppImage --appdir AppDir -d "$GITHUB_WORKSPACE"/dist/BBLauncher.desktop  -e "$GITHUB_WORKSPACE"/build/BB_Launcher -i "$GITHUB_WORKSPACE"/dist/BBIcon.png --plugin qt
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
        mv BB_Launcher-x86_64.AppImage BB_Launcher-qt.AppImage

    - name: Upload Linux Qt artifact
      uses: actions/upload-artifact@v7
      with:
        path: BB_Launcher-qt.AppImage
        archive: false

  build-linux-downloader:
    runs-on: ubuntu-24.04
    needs: get-info
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Add LLVM repository
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main'

    - name: Install dependencies
      run: sudo apt-get update && sudo apt install -y libx11-dev libxext-dev libwayland-dev libdecor-0-dev libxkbcommon-dev libglfw3-dev libgles2-mesa-dev libfuse2 mold build-essential libasound2-dev libpulse-dev libopenal-dev libudev-dev

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.10.0
        arch: linux_gcc_64
        modules: "qtmultimedia qtimageformats qtserialport qtpositioning qtwebchannel qtwebengine qtwebview qtwebsockets"
        tools: 'tools_generic tools_opensslv3_src'
        setup-python: false
        cache: true

    - name: Print CPU Info
      run: cat /proc/cpuinfo

    - name: Configure CMake
      run: cmake --fresh -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=mold" -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=mold" -DUSE_WEBENGINE=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Build AppImage
      run: |
        export Qt6_DIR="/usr/lib/qt6"
        export PATH="$Qt6_DIR/bin:$PATH"
        export LINUXDEPLOY_EXCLUDED_LIBRARIES="libqtiff.so;libnss3.so;libnssutil3.so"
        export EXTRA_QT_PLUGINS="waylandcompositor"
        export EXTRA_PLATFORM_PLUGINS="libqwayland.so"
        wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-checkrt/releases/download/continuous/linuxdeploy-plugin-checkrt-x86_64.sh"
        chmod a+x linuxdeploy-x86_64.AppImage
        chmod a+x linuxdeploy-plugin-qt-x86_64.AppImage
        chmod a+x linuxdeploy-plugin-checkrt-x86_64.sh
        ./linuxdeploy-x86_64.AppImage --appdir AppDir
        bash ./linuxdeploy-plugin-checkrt-x86_64.sh --appdir AppDir
        ./linuxdeploy-x86_64.AppImage --appdir AppDir -d "$GITHUB_WORKSPACE"/dist/BBLauncher.desktop  -e "$GITHUB_WORKSPACE"/build/BB_Launcher -i "$GITHUB_WORKSPACE"/dist/BBIcon.png --plugin qt
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
        mv BB_Launcher-x86_64.AppImage BB_Launcher-qt-Downloader.AppImage

    - name: Upload Linux Downloader artifact
      uses: actions/upload-artifact@v7
      with:
        path: BB_Launcher-qt-Downloader.AppImage
        archive: false

  pre-release:
    if: github.repository == 'rainmakerv3/BB_Launcher' && github.event_name == 'push'
    needs: [get-info, build-windows, build-windows-noUAC, build-linux, build-linux-downloader, build-macos]
    runs-on: ubuntu-24.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts

    - name: Make AppImages executable
      run: |
          for file in ./artifacts/**/*.AppImage; do
              if [ -f "$file" ]; then
                  chmod +x "$file"
              fi
          done

    - name: Compress individual directories (without parent directory)
      run: |
        cd ./artifacts
        for dir in */; do
            if [ -d "$dir" ]; then
                dir_name=${dir%/}
                # Check if any .AppImage file exists
                if ls "$dir_name"/*.AppImage >/dev/null 2>&1; then
                    echo "Applying permissions to AppImages in $dir_name"
                    chmod +x "$dir_name"/*.AppImage
                else
                    echo "Creating zip for $dir_name"
                    (cd "$dir_name" && zip -r "../${dir_name}.zip" .)
                fi
            fi
        done

    - name: Get latest release information
      id: get_latest_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        api_url="https://api.github.com/repos/${{ github.repository }}"
        latest_release_info=$(curl -H "Authorization: token $GITHUB_TOKEN" "$api_url/releases/latest")
        echo "last_release_tag=$(echo "$latest_release_info" | jq -r '.tag_name')" >> $GITHUB_ENV

    - name: Create Pre-Release on GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      id: create_release
      uses: ncipollo/release-action@v1
      with:
        name: "Pre-release-BBLauncher-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}"
        tag: "Pre-release-BBLauncher-${{ needs.get-info.outputs.date }}-${{ needs.get-info.outputs.shorthash }}"
        draft: false
        prerelease: true
        body: "- Prerelease builds are meant for testing, releases are better for general use\n- Full Changelog: https://github.com/rainmakerv3/BB_Launcher/commits/master/"
        artifacts: "./artifacts/*.zip,./artifacts/*/*.AppImage"
        
    - name: Get current pre-release information
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        api_url="https://api.github.com/repos/${{ github.repository }}/releases"
        
        # Get all releases (sorted by date)
        releases=$(curl -H "Authorization: token $GITHUB_TOKEN" "$api_url")
        
        # Capture the most recent pre-release (assuming the first one is the latest)
        current_release=$(echo "$releases" | jq -c '.[] | select(.prerelease == true) | .published_at' | sort -r | head -n 1)
        
        # Remove extra quotes from captured date
        current_release=$(echo $current_release | tr -d '"')
                
        # Export the current published_at to be available for the next step
        echo "CURRENT_PUBLISHED_AT=$current_release" >> $GITHUB_ENV
    
    - name: Delete old pre-releases and tags
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        api_url="https://api.github.com/repos/${{ github.repository }}/releases"
        
        # Get current pre-releases
        releases=$(curl -H "Authorization: token $GITHUB_TOKEN" "$api_url")
                
        # Remove extra quotes from captured date
        CURRENT_PUBLISHED_AT=$(echo $CURRENT_PUBLISHED_AT | tr -d '"')
        
        # Convert CURRENT_PUBLISHED_AT para timestamp Unix
        current_published_ts=$(date -d "$CURRENT_PUBLISHED_AT" +%s)
        
        # Identify pre-releases
        echo "$releases" | jq -c '.[] | select(.prerelease == true)' | while read -r release; do
          release_date=$(echo "$release" | jq -r '.published_at')
          release_id=$(echo "$release" | jq -r '.id')
          release_tag=$(echo "$release" | jq -r '.tag_name')
          
          # Remove extra quotes from captured date
          release_date=$(echo $release_date | tr -d '"')
          
          # Convert release_date para timestamp Unix
          release_date_ts=$(date -d "$release_date" +%s)
                    
          # Compare timestamps and delete old pre-releases
          if [[ "$release_date_ts" -lt "$current_published_ts" ]]; then
            echo "Deleting old pre-release: $release_id from $release_date with tag: $release_tag"
            # Delete the pre-release
            curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" "$api_url/$release_id"
            # Delete the tag
            curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$release_tag"
          else
            echo "Skipping pre-release: $release_id (newer or same date)"
          fi
        done
